    // ========== 30+ ПАТТЕРНОВ НА РЕЖИМ ==========
    
    // Функция для построения вариантов base
    function buildBaseVariants(base) {
      const clean = base.toLowerCase().replace(/[^a-z]/g, '');
      if (clean.length < 2) return [clean];
      
      const variants = new Set();
      
      // Полное имя
      variants.add(clean);
      
      // Первые 3-4 символа
      if (clean.length >= 3) variants.add(clean.slice(0, 3));
      if (clean.length >= 4) variants.add(clean.slice(0, 4));
      
      // Последние 3-4 символа
      if (clean.length >= 3) variants.add(clean.slice(-3));
      if (clean.length >= 4) variants.add(clean.slice(-4));
      
      // Без последней буквы
      if (clean.length > 2) variants.add(clean.slice(0, -1));
      
      // Без первой буквы
      if (clean.length > 2) variants.add(clean.slice(1));
      
      return Array.from(variants);
    }

        (baseVar) => baseVar + "night",
        (baseVar) => "vel" + baseVar,
        (baseVar) => "sin" + baseVar,
        (baseVar) => "wild" + baseVar,
        (baseVar) => "sweet" + baseVar,
        (baseVar) => "dark" + baseVar,
        (baseVar) => "hot" + baseVar,
        (baseVar) => baseVar + "vel",
        (baseVar) => baseVar + "nox",
        (baseVar) => baseVar + "vex",
        (baseVar) => baseVar + "ria",
        (baseVar) => baseVar + "mia",
        (baseVar) => baseVar + "lia",
        (baseVar) => baseVar + "tia",
        (baseVar) => baseVar + "cia"
      ]
    };

    // ========== ЖЁСТКАЯ СИСТЕМА ОЦЕНКИ ==========
    
    function scoreName(name, mode, base) {
      let score = 0;
      
      // Длина (идеально 5-9)
      if (name.length >= 5 && name.length <= 8) score += 50;
      else if (name.length === 4 || name.length === 9) score += 30;
      else if (name.length < 4) score -= 100;
      else if (name.length > 10) score -= 80;
      
      // Читаемость (гласные)
      const vowels = (name.match(/[aeiouy]/gi) || []).length;
      if (vowels >= 2 && vowels <= 4) score += 40;
      else if (vowels === 1 || vowels === 5) score += 20;
      else if (vowels === 0) score -= 100;
      
      // Повторы
      if (/(.)\1{2,}/.test(name)) score -= 80;
      
      // СВЯЗЬ С BASE (КРИТИЧНО)
      if (base && base.length >= 2) {
        const variants = buildBaseVariants(base);
        let bestMatch = 0;
        
        for (const v of variants) {
          if (v.length >= 3 && name.includes(v)) {
            bestMatch = Math.max(bestMatch, v.length * 20);
          } else if (v.length === 2 && name.includes(v)) {
            bestMatch = Math.max(bestMatch, 30);
          }
        }
        
        if (bestMatch > 0) {
          score += bestMatch;
        } else {
          // Нет связи с base - жёсткий штраф
          score -= 200;
        }
      }
      
      // Специфичные для режима
      if (mode === 'social') {
        if (/[zxq]/.test(name)) score -= 30;
        if (name.includes('.')) score += 30;
        if (name.length <= 8) score += 30;
        if (/[aeiou]{2,}/.test(name)) score += 20;
      } else if (mode === 'gamer') {
        if (/[xz]/.test(name)) score += 30;
        if (name.length <= 6) score += 40;
        if (/[^aeiou]{3,}/.test(name)) score += 20;
      } else if (mode === 'spicy') {
        const spicyWords = ['vel', 'sin', 'nox', 'heat', 'wild', 'kiss', 'bad', 'hot'];
        if (spicyWords.some(w => name.includes(w))) score += 50;
        if (name.length >= 5 && name.length <= 9) score += 40;
        if (name.includes('xo')) score += 30;
        if (name.includes('rx')) score += 20;
      }
      
      return score;
    }

    // ========== ФИЛЬТРЫ ==========
    
    function isStrongCandidate(name, mode, base) {
      if (name.length < 3 || name.length > 12) return false;
      if (/(.)\1{3,}/.test(name)) return false;
      
      // Связь с base
      if (base && base.length >= 2) {
        const variants = buildBaseVariants(base);
        let hasStrongConnection = false;
        
        for (const v of variants) {
          if (v.length >= 3 && name.includes(v)) {
            hasStrongConnection = true;
            break;
          }
          if (v.length === 2 && name.includes(v) && name.length > 4) {
            hasStrongConnection = true;
            break;
          }
        }
        
        if (!hasStrongConnection) return false;
      }
      
      return true;
    }

    // ========== ГЕНЕРАЦИЯ С BASE-FIRST ==========
    
    function generateBestName(mode, base = '') {
      const cleanBase = base.toLowerCase().replace(/[^a-z]/g, '');
      
      // Если нет base, используем случайные cores
      if (cleanBase.length < 2) {
        const fallback = mode === 'social' ? pick(DICTS.social.cores) + pick(DICTS.social.endings) :
                        mode === 'gamer' ? pick(DICTS.gamer.cores) + pick(DICTS.gamer.endings) : 
                        pick(DICTS.spicy.prefixes) + pick(DICTS.spicy.suffixes);
        return fallback.slice(0, 10);
      }
      
      const baseVariants = buildBaseVariants(cleanBase);
      const results = [];
      const seen = new Set();
      const attempts = 2000; // 2000 внутренних кандидатов
      
      for (let i = 0; i < attempts; i++) {
        // Выбираем случайный вариант base
        const baseVar = pick(baseVariants);
        
        // Выбираем паттерн
        const patterns = PATTERNS[mode];
        const pattern = pick(patterns);
        
        let name = pattern(baseVar);
        
        // Очистка
        name = name.toLowerCase().replace(/[^a-z0-9._]/g, '');
        
        // Базовые проверки
        if (!isStrongCandidate(name, mode, cleanBase)) continue;
        if (seen.has(name)) continue;
        
        const score = scoreName(name, mode, cleanBase);
        if (score < 80) continue; // жёсткий reject
        
        seen.add(name);
        results.push({ name, score });
      }
      
      if (results.length === 0) {
        // Супер-запасной вариант с гарантией
        return cleanBase.slice(0,4) + (mode === 'social' ? 'ri' : mode === 'gamer' ? 'x' : 'xo');
      }
      
      results.sort((a, b) => b.score - a.score);
      return results[0].name;
    }

    // ========== ПРЕВЬЮ ==========
    
    function renderPreview(name, mode) {
      const container = document.getElementById('previewContent');
      
      if (mode === 'social') {
        container.innerHTML = `
          <div class="social-preview">
            <div class="social-avatar">${name[0].toUpperCase()}</div>
            <div class="social-info">
              <div class="social-handle">@${name}</div>
              <div class="social-bio">✨ creator • ${pick(['design', 'music', 'art', 'tech', 'travel'])}</div>
              <div class="social-tags">
                <span>#${pick(['creative', 'aesthetic', 'minimal', 'modern'])}</span>
                <span>#${pick(['vibes', 'lifestyle', 'daily', 'fresh'])}</span>
              </div>
            </div>
          </div>
        `;
      } else if (mode === 'gamer') {
        container.innerHTML = `
          <div class="gamer-preview">
            <div class="gamer-avatar">🎮</div>
            <div class="gamer-info">
              <div class="gamer-tag">${name}</div>
              <div class="gamer-stats">Level ${Math.floor(Math.random() * 50) + 20} • ${pick(['Solo', 'Squad', 'Clan', 'Pro'])}</div>
            </div>
          </div>
        `;
      } else if (mode === 'spicy') {
        container.innerHTML = `
          <div class="spicy-preview">
            <div class="spicy-avatar">🔥</div>
            <div class="spicy-info">
              <div class="spicy-name">${name}</div>
              <div class="spicy-bio">✨ ${pick(['don\'t be a tease', 'catch me if you can', 'good vibes only', 'dangerous'])}</div>
            </div>
          </div>
        `;
      }
    }

    // ========== ВСПОМОГАТЕЛЬНЫЕ ==========
    
    async function copyToClipboard(text) {
      try {
        await navigator.clipboard.writeText(text);
        return true;
      } catch (err) {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        const ok = document.execCommand('copy');
        document.body.removeChild(ta);
        return ok;
      }
    }

    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 1500);
    }

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    // ========== СОСТОЯНИЕ ==========
    
    let currentMode = 'social';
    let currentName = 'alexri';
    let saved = JSON.parse(localStorage.getItem('saved') || '[]');

    // ========== РЕНДЕР ==========
    
    function renderTop(name) {
      document.getElementById('topName').textContent = name;
      document.getElementById('topBadge').textContent = '✨ From your name';
      document.getElementById('topMeta').textContent = 
        currentMode === 'social' ? 'Clean social handle' :
        currentMode === 'gamer' ? 'Sharp gaming tag' : 'Bold spicy alias';
      
      renderPreview(name, currentMode);
    }

    // ========== ОСНОВНЫЕ ДЕЙСТВИЯ ==========
    
    function generateNew() {
      const base = document.getElementById('base').value;
      currentName = generateBestName(currentMode, base);
      renderTop(currentName);
    }

    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    
    document.addEventListener('DOMContentLoaded', () => {
      // Режимы
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentMode = btn.dataset.mode;
          document.getElementById('base').placeholder = 
            currentMode === 'social' ? 'e.g., alex, ray, max' :
            currentMode === 'gamer' ? 'e.g., ray, max, z' : 'e.g., velvet, sin';
          generateNew();
        });
      });

      // Generate
      document.getElementById('generateBtn').addEventListener('click', generateNew);
      document.getElementById('base').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') generateNew();
      });

      // Copy
      document.getElementById('copyTop').addEventListener('click', async () => {
        const ok = await copyToClipboard(currentName);
        toast(ok ? 'Copied!' : 'Copy failed');
      });

      // Save
      document.getElementById('saveTop').addEventListener('click', () => {
        if (!saved.some(s => s.name === currentName)) {
          saved.unshift({ name: currentName, mode: currentMode });
          saved = saved.slice(0, 20);
          localStorage.setItem('saved', JSON.stringify(saved));
          toast('Saved!');
        } else {
          toast('Already saved');
        }
      });

      // Share
      document.getElementById('shareTop').addEventListener('click', () => {
        if (navigator.share) {
          navigator.share({
            title: 'NickForge',
            text: currentName
          }).catch(() => {
            copyToClipboard(currentName);
            toast('Name copied!');
          });
        } else {
          copyToClipboard(currentName);
          toast('Name copied!');
        }
      });

      // Donate / Feedback
      document.getElementById('donateLink').addEventListener('click', (e) => {
        e.preventDefault();
        window.open('https://buymeacoffee.com/', '_blank');
      });

      document.getElementById('feedbackLink').addEventListener('click', (e) => {
        e.preventDefault();
        window.open('mailto:feedback@nickforge.com', '_blank');
      });

      // Keyboard C
      document.addEventListener('keydown', async (e) => {
        if (e.key.toLowerCase() === 'c' && !e.ctrlKey && !e.metaKey) {
          const active = document.activeElement;
          if (active.tagName !== 'INPUT' && active.tagName !== 'TEXTAREA') {
            const ok = await copyToClipboard(currentName);
            toast(ok ? 'Copied!' : 'Copy failed');
          }
        }
      });

      // Старт
      generateNew();
    });
  </script>
</body>
</html>
