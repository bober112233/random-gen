<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NickForge — Cool Username Generator</title>
  <meta name="description" content="Generate unique, strong usernames in seconds. Social, Gamer & Spicy styles." />
  <meta name="theme-color" content="#4a00e0" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0015;
      --card: rgba(20, 10, 50, 0.75);
      --accent: #ff6b00;
      --purple: #8b5cf6;
      --purple-dark: #6d28d9;
      --text: #f1eaff;
      --muted: #a78bfa;
      --border: #4c1d95;
      --glow: 0 0 30px rgba(255,107,0,0.4);
      --radius: 20px;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
      line-height: 1.5;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      flex-wrap: wrap;
      gap: 20px;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 42px;
      font-weight: 900;
      background: linear-gradient(90deg, #c084fc, #ff6b00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav a {
      color: var(--muted);
      text-decoration: none;
      margin-left: 24px;
      font-weight: 600;
      transition: color 0.2s;
    }

    .nav a:hover { color: white; }

    .modes {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin: 40px 0 32px;
    }

    .mode {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      cursor: pointer;
      transition: all 0.25s ease;
      backdrop-filter: blur(10px);
    }

    .mode:hover {
      transform: translateY(-4px);
      box-shadow: var(--glow);
      border-color: var(--accent);
    }

    .mode.active {
      border-color: var(--accent);
      box-shadow: var(--glow);
      background: rgba(139,92,246,0.12);
    }

    .mode h3 {
      font-size: 24px;
      margin-bottom: 8px;
      font-weight: 800;
    }

    .social h3   { color: #c084fc; }
    .gamer h3    { color: #ff6b00; }
    .spicy h3    { color: #ec4899; }

    .input-group {
      display: flex;
      gap: 16px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    input {
      flex: 1;
      min-width: 300px;
      height: 64px;
      padding: 0 28px;
      font-size: 18px;
      background: rgba(30,20,70,0.6);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: white;
      outline: none;
      transition: all 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(255,107,0,0.25);
    }

    button.generate {
      height: 64px;
      padding: 0 40px;
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--purple), var(--accent));
      color: white;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: var(--glow);
      transition: all 0.25s;
    }

    button.generate:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 40px rgba(255,107,0,0.6);
    }

    .output {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
    }

    .result {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      backdrop-filter: blur(10px);
    }

    .nickname {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(48px, 9vw, 100px);
      font-weight: 900;
      background: linear-gradient(90deg, #c084fc, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 16px 0;
      word-break: break-all;
    }

    .meta {
      color: var(--muted);
      font-size: 18px;
      margin-bottom: 24px;
    }

    .actions button {
      padding: 14px 28px;
      border-radius: 999px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      margin-right: 12px;
    }

    .copy-btn {
      background: var(--accent);
      color: black;
      border: none;
    }

    .regen-btn {
      background: transparent;
      border: 1px solid var(--muted);
      color: var(--muted);
    }

    .preview {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      backdrop-filter: blur(10px);
    }

    .preview-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    .preview-box {
      min-height: 320px;
      border-radius: 16px;
      padding: 24px;
      background: linear-gradient(145deg, rgba(139,92,246,0.08), rgba(255,107,0,0.08));
    }

    @media (max-width: 980px) {
      .output { grid-template-columns: 1fr; }
    }

    @media (max-width: 600px) {
      .input-group { flex-direction: column; }
      button.generate { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="container">

    <header>
      <div class="logo">NickForge</div>
      <div class="nav">
        <a href="#">Donate ☕</a>
        <a href="#">Feedback</a>
      </div>
    </header>

    <div class="modes">
      <div class="mode active" data-mode="social">
        <h3>Social</h3>
        <p>Clean, aesthetic, modern handles</p>
      </div>
      <div class="mode" data-mode="gamer">
        <h3>Gamer</h3>
        <p>Sharp, short, aggressive tags</p>
      </div>
      <div class="mode" data-mode="spicy">
        <h3>Spicy</h3>
        <p>Bold, flirty, provocative</p>
      </div>
    </div>

    <div class="input-group">
      <input id="input" placeholder="Your name or keyword (alex, mia, vex...)" autocomplete="off" />
      <button class="generate" id="generate">Generate</button>
    </div>

    <div class="output">
      <div class="result">
        <div class="nickname" id="nickname">—</div>
        <div class="meta" id="meta">Select mode and generate</div>
        <div class="actions">
          <button class="copy-btn" id="copy">Copy</button>
          <button class="regen-btn" id="regen">Regenerate</button>
        </div>
      </div>

      <div class="preview">
        <div class="preview-label">Preview</div>
        <div class="preview-box" id="preview"></div>
      </div>
    </div>

  </div>

  <script>
    const $ = s => document.querySelector(s);
    const $$ = s => [...document.querySelectorAll(s)];

    const modes = {
      social: { name: "Social", meta: "Clean social handle" },
      gamer:  { name: "Gamer",  meta: "Aggressive gamer tag" },
      spicy:  { name: "Spicy",  meta: "Bold & provocative alias" }
    };

    let currentMode = "social";
    let currentNick = "";

    const dicts = {
      social: ["ri", "vi", "na", "ia", "ly", "sky", "vibe", "nova", "glow", "wave", "its", "hey", "real", "pure"],
      gamer:  ["x", "z", "xx", "zz", "rx", "zx", "ix", "ox", "kz", "vx", "qx", "rk"],
      spicy:  ["xo", "rx", "na", "va", "ina", "ora", "kiss", "love", "nox", "rose", "luna", "hot"]
    };

    function generateNick(mode, input) {
      let base = input.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
      if (!base) base = ["alex","mia","vex","nova","kira","zara","luna"][Math.floor(Math.random()*7)];

      const suffix = dicts[mode][Math.floor(Math.random() * dicts[mode].length)];

      let nick = base + suffix;
      if (nick.length > 14) nick = base.slice(0, 10) + suffix;

      // Делаем более разнообразно
      if (Math.random() > 0.6) nick = suffix + base.slice(0,8);
      if (Math.random() > 0.8) nick = base.slice(0,5) + suffix + (Math.random()>0.5 ? "x" : "");

      return nick;
    }

    function updatePreview(nick, mode) {
      const p = $("#preview");
      let style = "";

      if (mode === "social") {
        style = `background: linear-gradient(145deg, #2a1b4a, #1a0f33); color: white; padding: 32px; border-radius: 16px;`;
        p.innerHTML = `
          <div style="${style}">
            <div style="font-size: 32px; font-weight: 900;">@${nick}</div>
            <div style="margin: 12px 0; color: #c084fc;">creator • aesthetic • vibes</div>
            <div style="font-size: 15px; color: #a78bfa;">1.2k followers • Jakarta</div>
          </div>`;
      } else if (mode === "gamer") {
        style = `background: #0f0a1f; color: #ffedd5; padding: 32px; border-radius: 16px;`;
        p.innerHTML = `
          <div style="${style}">
            <div style="font-size: 36px; color: #ff6b00; font-weight: 900;">${nick}</div>
            <div style="margin: 16px 0; color: #fbbf24;">Ranked • Clutch King • K/D 3.8</div>
            <div style="font-size: 16px;">EU West • Top 0.8%</div>
          </div>`;
      } else {
        style = `background: #1f0f2a; color: #ffe4e1; padding: 32px; border-radius: 16px;`;
        p.innerHTML = `
          <div style="${style}">
            <div style="font-size: 36px; color: #ec4899; font-weight: 900;">${nick}</div>
            <div style="margin: 16px 0;">late night • too hot to handle • tease</div>
            <div style="font-size: 16px;">don't blink 🔥</div>
          </div>`;
      }
    }

    function generate() {
      const input = $("#input").value.trim();
      currentNick = generateNick(currentMode, input);
      $("#nickname").textContent = currentNick;
      $("#meta").textContent = modes[currentMode].meta;
      updatePreview(currentNick, currentMode);
    }

    $$(".mode").forEach(el => {
      el.addEventListener("click", () => {
        $$(".mode").forEach(m => m.classList.remove("active"));
        el.classList.add("active");
        currentMode = el.dataset.mode;
        generate();
      });
    });

    $("#generate").onclick = generate;
    $("#input").onkeydown = e => { if (e.key === "Enter") generate(); };
    $("#regen").onclick = generate;

    $("#copy").onclick = async () => {
      if (!currentNick) return;
      await navigator.clipboard.writeText(currentNick);
      alert("Copied to clipboard!");
    };

    // Initial render
    generate();
  </script>
</body>
</html>
