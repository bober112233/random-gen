      padding: 0;
      box-sizing: border-box;
    }

      line-height: 1.5;
      min-height: 100vh;
      padding: 32px 24px;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
    }

      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 48px;
      flex-wrap: wrap;
      gap: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, #7553ff, #9b7aff);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 24px -10px #7553ff;
    }

    .brand h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #16131f;
    }

    .brand p {
      color: #6f6585;
      font-size: 15px;
      margin-top: 4px;
    }

    .header-actions {
      display: flex;
      gap: 20px;
      background: white;
      padding: 10px 24px;
      border-radius: 60px;
      border: 1px solid #ece5ff;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.02);
    }

    .header-actions a {
      color: #7553ff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
    }

    .header-actions a:hover {
      color: #5a3ad1;
    }

    .separator {
      width: 1px;
      height: 24px;
      background: #ece5ff;
    }

    /* === РЕЖИМЫ === */
    .mode-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 40px;
    }

    .mode-btn {
      background: white;
      border: 1px solid #ece5ff;
      border-radius: 24px;
      padding: 20px 18px;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.02);
    }

    .mode-btn:hover {
      border-color: #b9a9ff;
      transform: translateY(-3px);
      box-shadow: 0 16px 28px -12px #7553ff;
    }

    .mode-btn.active {
      border-color: #7553ff;
      border-width: 2px;
      box-shadow: 0 16px 30px -12px #7553ff;
    }

    .mode-name {
      font-weight: 700;
      font-size: 22px;
      margin-bottom: 6px;
    }

    .mode-desc {
      color: #6f6585;
      font-size: 14px;
    }

    .social .mode-name { color: #7553ff; }
    .gamer .mode-name { color: #f97316; }
    .spicy .mode-name { color: #ec4899; }

    /* === ОСНОВНАЯ КАРТОЧКА === */
    .main-card {
      background: white;
      border-radius: 48px;
      box-shadow: 0 30px 60px -20px rgba(117, 83, 255, 0.2);
      padding: 40px;
      margin-bottom: 0;
      border: 1px solid rgba(255, 255, 255, 0.6);
    }

    /* === КОНТРОЛЫ === */
    .controls-row {
      display: flex;
      gap: 16px;
      margin-bottom: 48px;
      align-items: center;
    }

    .field {
      flex: 1;
    }

    .field input {
      width: 100%;
      background: #f8f5ff;
      border: 1px solid #ece5ff;
      border-radius: 34px;
      padding: 20px 24px;
      font-size: 18px;
      font-family: inherit;
      transition: 0.15s;
    }

    .field input:focus {
      outline: none;
      border-color: #7553ff;
      box-shadow: 0 0 0 6px rgba(117, 83, 255, 0.1);
      background: white;
    }

    .field input::placeholder {
      color: #a69bb8;
      font-size: 18px;
    }

    .btn-primary {
      background: #7553ff;
      border: none;
      border-radius: 40px;
      padding: 20px 40px;
      font-weight: 600;
      font-size: 18px;
      color: white;
      cursor: pointer;
      transition: 0.15s;
      white-space: nowrap;
    }

    .btn-primary:hover {
      background: #5f3ee0;
      transform: translateY(-3px);
      box-shadow: 0 18px 30px -12px #7553ff;
    }

    .btn-secondary {
      background: white;
      border: 1px solid #ece5ff;
      border-radius: 40px;
      padding: 14px 28px;
      font-weight: 600;
      font-size: 16px;
      color: #16131f;
      cursor: pointer;
      transition: 0.15s;
    }

    .btn-secondary:hover {
      background: #f8f5ff;
      border-color: #b9a9ff;
    }

    /* === TOP БЛОК === */
    .top-section {
      margin-bottom: 40px;
    }

    .top-badge {
      display: inline-block;
      background: #f0ebff;
      color: #7553ff;
      font-size: 14px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 40px;
      margin-bottom: 20px;
    }

    .top-name {
      font-size: 84px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 20px;
      word-break: break-word;
      color: #16131f;
    }

    .top-meta {
      color: #6f6585;
      font-size: 18px;
      margin-bottom: 32px;
    }

    .top-actions {
      display: flex;
      gap: 16px;
    }

    /* === PREVIEW БЛОК === */
    .preview-section {
      background: linear-gradient(145deg, #f8f5ff 0%, #f2ebff 100%);
      border-radius: 40px;
      padding: 40px;
      border: 1px solid #ece5ff;
    }

    .preview-label {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      color: #8f82a5;
      margin-bottom: 24px;
      letter-spacing: 1px;
    }

    /* === ПРЕВЬЮ ДЛЯ SOCIAL === */
    .social-preview {
      display: flex;
      align-items: center;
      gap: 32px;
      background: white;
      padding: 32px;
      border-radius: 36px;
      box-shadow: 0 20px 30px -12px rgba(117, 83, 255, 0.15);
    }

    .social-avatar {
      width: 96px;
      height: 96px;
      background: linear-gradient(135deg, #7553ff, #9b7aff);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 44px;
      box-shadow: 0 15px 25px -8px #7553ff;
    }

    .social-info {
      flex: 1;
    }

    .social-handle {
      font-weight: 700;
      font-size: 32px;
      margin-bottom: 8px;
      color: #16131f;
    }

    .social-stats {
      display: flex;
      gap: 32px;
      color: #8f82a5;
      font-size: 16px;
    }

    /* === ПРЕВЬЮ ДЛЯ GAMER === */
    .gamer-preview {
      background: #16131f;
      padding: 36px;
      border-radius: 36px;
      display: flex;
      align-items: center;
      gap: 32px;
      box-shadow: 0 30px 40px -16px rgba(0, 0, 0, 0.3);

    .gamer-avatar {
      width: 96px;
      height: 96px;
      background: linear-gradient(135deg, #f97316, #fdba74);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #16131f;
      font-weight: 800;
      font-size: 44px;
    }

    .gamer-info {
      flex: 1;
    }

    .gamer-tag {
      font-weight: 800;
      font-size: 36px;
      margin-bottom: 8px;
      color: white;
    }

    .gamer-level {
      color: #a69bb8;
      font-size: 16px;
    }

    .spicy-preview {
      background: linear-gradient(135deg, #241f2c, #1a1725);
      padding: 36px;
      border-radius: 36px;
      display: flex;
      align-items: center;
      gap: 32px;
      border: 1px solid rgba(236, 72, 153, 0.2);
    }

      width: 96px;
      height: 96px;
      background: linear-gradient(135deg, #ec4899, #f472b6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      font-size: 44px;
      box-shadow: 0 15px 25px -8px #ec4899;
    }

      flex: 1;
    }

    .spicy-name {
      font-weight: 700;
      font-size: 36px;
      margin-bottom: 8px;
      color: white;
    }

    .spicy-bio {
      color: #d4b3cb;
      font-size: 16px;
    }

    /* Saved, Duel, Spicy secondary — удалены */

    /* === TOAST === */
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #16131f;
      color: white;
      padding: 16px 32px;
      border-radius: 60px;
      font-size: 16px;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: 0.2s;
      z-index: 1000;
      box-shadow: 0 20px 40px -8px black;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .hidden {
      display: none !important;
    }
  </style>

        (base) => "z" + base,
        (base) => base + "or",
        (base) => base + "ar",
        (base) => base + "on",
        (base) => base + "an",
        (base) => base.slice(0,3) + pick(DICTS.gamer.hard).slice(0,2) + "x",
        (base) => base.slice(0,4) + "rx",
        (base) => base.slice(0,4) + "zx",
        (base) => base + "yx",
        (base) => base + "ox",
        (base) => base + "ix",
        (base) => base.slice(0,3) + pick(["xor", "zor", "kra"]),
        (base) => pick(["vex", "nox"]) + base,
        (base) => base + pick(["core", "byte", "flux"]),
        (base) => base + pick(["rage", "fury"]),
        (base) => base + "xX"
      ],
      
      spicy: [
        (base) => pick(DICTS.spicy.prefixes) + base,
        (base) => base + pick(DICTS.spicy.suffixes),
        (base) => base + pick(DICTS.spicy.soft) + pick(DICTS.spicy.endings),
        (base) => pick(DICTS.spicy.prefixes).slice(0,4) + base + pick(DICTS.spicy.soft),
        (base) => base.slice(0,4) + pick(DICTS.spicy.suffixes),
        (base) => base.slice(0,3) + pick(DICTS.spicy.soft) + "xo",
        (base) => base.slice(0,4) + "xo",
        (base) => base.slice(0,4) + "rx",
        (base) => base + "sin",
        (base) => base + "kiss",
        (base) => base + "love",
        (base) => base + "night",
        (base) => "velvet" + base,
        (base) => "wild" + base,
        (base) => "sweet" + base,
        (base) => "dark" + base,
        (base) => "hot" + base,
        (base) => base + "vel",
        (base) => base + "nox",
        (base) => base + "vex",
        (base) => base + "ria",
        (base) => base + "na",
        (base) => base + "va",
        (base) => base + "ra",
        (base) => base + "la"
      ]
    };

    // ========== СИСТЕМА ОЦЕНКИ ==========
    
    function scoreName(name, mode, base) {
      let score = 50;
      
      // Длина (идеально 5-9)
      if (name.length >= 5 && name.length <= 8) score += 30;
      else if (name.length === 4 || name.length === 9) score += 20;
      else if (name.length < 4) score -= 30;
      else if (name.length > 10) score -= 40;
      
      // Читаемость (гласные)
      const vowels = (name.match(/[aeiouy]/gi) || []).length;
      if (vowels >= 2 && vowels <= 4) score += 25;
      else if (vowels === 1 || vowels === 5) score += 10;
      else if (vowels === 0) score -= 50;
      
      // Повторы
      if (/(.)\1{2,}/.test(name)) score -= 40;
      
      // Связь с base (критично)
      if (base) {
        const cleanBase = base.toLowerCase().replace(/[^a-z]/g, '');
        if (cleanBase.length > 1) {
          if (name.includes(cleanBase)) score += 100; // прямое вхождение
          else if (name.includes(cleanBase.slice(0,3))) score += 70;
          else if (cleanBase.split('').some(c => name.includes(c))) score += 30;
          else score -= 50; // нет связи с base - штраф
        }
      }
      
      // Специфичные для режима
      if (mode === 'social') {
        if (/[zxq]/.test(name)) score -= 20;
        if (name.includes('.')) score += 20;
        if (name.length <= 8) score += 20;
      } else if (mode === 'gamer') {
        if (/[xz]/.test(name)) score += 20;
        if (name.length <= 6) score += 30;
        if (name.includes('xX')) score += 10;
      } else if (mode === 'spicy') {
        const spicyWords = ['vel', 'sin', 'nox', 'heat', 'wild', 'kiss', 'bad', 'hot'];
        if (spicyWords.some(w => name.includes(w))) score += 40;
        if (name.length >= 5 && name.length <= 9) score += 30;
        if (name.includes('xo')) score += 20;
      }
      
      return Math.max(0, Math.min(200, score));
    }

    // ========== УМНАЯ ГЕНЕРАЦИЯ С BASE-BINDING ==========
    
    function generateBestName(mode, base = '') {
      const cleanBase = base.toLowerCase().replace(/[^a-z]/g, '').slice(0, 8);
      
      // Если base есть - он должен быть в результате
      if (cleanBase.length < 2) {
        // Если нет base, используем случайные cores
        const fallback = mode === 'social' ? pick(DICTS.social.cores) :
                        mode === 'gamer' ? pick(DICTS.gamer.cores) : 
                        pick(DICTS.spicy.prefixes) + pick(DICTS.spicy.suffixes);
        return fallback.slice(0, 10);
      }
      
      const results = [];
      const seen = new Set();
      const attempts = 1000; // 1000 внутренних кандидатов
      
      for (let i = 0; i < attempts; i++) {
        const patterns = PATTERNS[mode];
        const pattern = patterns[Math.floor(Math.random() * patterns.length)];
        
        let name = pattern(cleanBase);
        
        // Очистка
        name = name.toLowerCase().replace(/[^a-z0-9._]/g, '');
        if (name.length < 3 || name.length > 12) continue;
        if (seen.has(name)) continue;
        
        // Проверка связи с base (обязательно)
        if (cleanBase.length > 1) {
          const baseParts = cleanBase.split('');
          const hasConnection = baseParts.some(part => name.includes(part));
          if (!hasConnection) continue;
        }
        
        const score = scoreName(name, mode, cleanBase);
        if (score < 60) continue; // reject низкого качества
        
        seen.add(name);
        results.push({ name, score });
      }
      
      if (results.length === 0) {
        // Fallback с гарантированной связью
        return cleanBase + (mode === 'social' ? 'ri' : mode === 'gamer' ? 'x' : 'xo');
      }
      
      results.sort((a, b) => b.score - a.score);
      return results[0].name;
    }

    // ========== ПРЕВЬЮ ==========
    
    function renderPreview(name, mode) {
      const container = document.getElementById('previewContent');
      
      if (mode === 'social') {
        container.innerHTML = `
          <div class="social-preview">
            <div class="social-avatar">${name[0].toUpperCase()}</div>
            <div class="social-info">
              <div class="social-handle">@${name}</div>
              <div class="social-stats">
                <span>📸 1.2k posts</span>
                <span>👥 8.7k followers</span>
                <span>❤️ 45k likes</span>
              </div>
            </div>
          </div>
        `;
      } else if (mode === 'gamer') {
        container.innerHTML = `
          <div class="gamer-preview">
            <div class="gamer-avatar">🎮</div>
            <div class="gamer-info">
              <div class="gamer-tag">${name}</div>
              <div class="gamer-level">Level 42 • 2.3k hours</div>
            </div>
          </div>
        `;
      } else if (mode === 'spicy') {
        container.innerHTML = `
          <div class="spicy-preview">
            <div class="spicy-avatar">🔥</div>
            <div class="spicy-info">
              <div class="spicy-name">${name}</div>
              <div class="spicy-bio">✨ "don't be a tease" ✨</div>
            </div>
          </div>
        `;
      }
    }

    // ========== ВСПОМОГАТЕЛЬНЫЕ ==========
    
    async function copyToClipboard(text) {
      try {
        await navigator.clipboard.writeText(text);
        return true;
      } catch (err) {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        const ok = document.execCommand('copy');
        document.body.removeChild(ta);
        return ok;
      }
    }

    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 1500);
    }

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    // ========== СОСТОЯНИЕ ==========
    
    let currentMode = 'social';
    let currentName = 'lunamay';
    let saved = JSON.parse(localStorage.getItem('saved') || '[]'); // сохраняем в фоне

    // ========== РЕНДЕР ==========
    
    function renderTop(name) {
      document.getElementById('topName').textContent = name;
      document.getElementById('topBadge').textContent = 
        currentMode === 'social' ? '✨ Best match for Social' :
        currentMode === 'gamer' ? '⚡ Best gamer tag' : '🔥 Best spicy name';
      document.getElementById('topMeta').textContent = 
        currentMode === 'social' ? 'Clean, short, memorable' :
        currentMode === 'gamer' ? 'Sharp, short gaming style' : 'Bold, flirty, provocative';
      
      renderPreview(name, currentMode);
    }

    // ========== ОСНОВНЫЕ ДЕЙСТВИЯ ==========
    
    function generateNew() {
      const base = document.getElementById('base').value;
      currentName = generateBestName(currentMode, base);
      renderTop(currentName);
    }

    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    
    document.addEventListener('DOMContentLoaded', () => {
      // Режимы
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentMode = btn.dataset.mode;
          document.getElementById('base').placeholder = 
            currentMode === 'social' ? 'e.g., alex, ray, max' :
            currentMode === 'gamer' ? 'e.g., x, z, ry' : 'e.g., velvet, sin';
          generateNew();
        });
      });

      // Generate
      document.getElementById('generateBtn').addEventListener('click', generateNew);
      document.getElementById('base').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') generateNew();
      });

      // Copy
      document.getElementById('copyTop').addEventListener('click', async () => {
        const ok = await copyToClipboard(currentName);
        toast(ok ? 'Copied!' : 'Copy failed');
      });

      // Save (в фоне, без UI блока)
      document.getElementById('saveTop').addEventListener('click', () => {
        if (!saved.some(s => s.name === currentName)) {
          saved.unshift({ name: currentName, mode: currentMode });
          saved = saved.slice(0, 20);
          localStorage.setItem('saved', JSON.stringify(saved));
          toast('Saved!');
        } else {
          toast('Already saved');
        }
      });

      // Share
      document.getElementById('shareTop').addEventListener('click', () => {
        if (navigator.share) {
          navigator.share({
            title: 'NickForge',
            text: currentName
          }).catch(() => {
            copyToClipboard(currentName);
            toast('Name copied!');
          });
        } else {
          copyToClipboard(currentName);
          toast('Name copied!');
        }
      });

      // Donate / Feedback
      document.getElementById('donateLink').addEventListener('click', (e) => {
        e.preventDefault();
        window.open('https://buymeacoffee.com/', '_blank');
      });

      document.getElementById('feedbackLink').addEventListener('click', (e) => {
        e.preventDefault();
        window.open('mailto:feedback@nickforge.com', '_blank');
      });

      // Keyboard C
      document.addEventListener('keydown', async (e) => {
        if (e.key.toLowerCase() === 'c' && !e.ctrlKey && !e.metaKey) {
          const active = document.activeElement;
          if (active.tagName !== 'INPUT' && active.tagName !== 'TEXTAREA') {
            const ok = await copyToClipboard(currentName);
            toast(ok ? 'Copied!' : 'Copy failed');
          }
        }
      });

      // Старт
      renderTop(currentName);
    });
  </script>
</body>
</html>
