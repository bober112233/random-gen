<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NickForge — Better usernames</title>
  <meta name="description" content="Generate one strong username from your name. Social, Gamer and Spicy modes." />
  <meta name="theme-color" content="#faf7ff" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-1: #fcfaff;
      --bg-2: #f4eeff;
      --card: rgba(255,255,255,.82);
      --stroke: #e9e0fb;
      --text: #171320;
      --muted: #726885;
      --purple: #7357ff;
      --purple-dark: #5c41e6;
      --purple-soft: #f2edff;
      --orange: #f47a20;
      --pink: #e84e96;
      --shadow: 0 20px 50px -22px rgba(103, 76, 230, .22);
      --radius-xl: 32px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --radius-sm: 14px;
    }

    body {
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(124,92,240,.12), transparent 28%),
        radial-gradient(circle at top right, rgba(232,78,150,.08), transparent 24%),
        linear-gradient(145deg, var(--bg-1) 0%, var(--bg-2) 100%);
      min-height: 100vh;
      padding: 24px;
    }

    .wrap {
      max-width: 1240px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 26px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #7256ff, #9c83ff);
      color: #fff;
      box-shadow: 0 14px 28px -14px rgba(114, 86, 255, .7);
      flex-shrink: 0;
    }

    .brand h1 {
      font-size: 32px;
      line-height: 1;
      letter-spacing: -.03em;
      margin-bottom: 4px;
    }

    .brand p {
      color: var(--muted);
      font-size: 15px;
    }

    .header-links {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(255,255,255,.8);
      border: 1px solid var(--stroke);
      border-radius: 999px;
      padding: 10px 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,.03);
    }

    .header-links a {
      color: var(--purple);
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
    }

    .divider {
      width: 1px;
      height: 18px;
      background: var(--stroke);
    }

    .modes {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }

    .mode-btn {
      background: rgba(255,255,255,.74);
      border: 1px solid var(--stroke);
      border-radius: 22px;
      padding: 16px 18px;
      cursor: pointer;
      transition: .18s ease;
      text-align: left;
      box-shadow: 0 8px 18px rgba(0,0,0,.02);
    }

    .mode-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 28px -20px rgba(95, 67, 223, .35);
    }

    .mode-btn.active {
      border-color: rgba(115,87,255,.55);
      box-shadow: 0 16px 30px -18px rgba(115,87,255,.45);
      background: #fff;
    }

    .mode-title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 4px;
      letter-spacing: -.02em;
    }

    .mode-desc {
      font-size: 13px;
      color: var(--muted);
    }

    .mode-btn[data-mode="social"] .mode-title { color: var(--purple); }
    .mode-btn[data-mode="gamer"] .mode-title { color: var(--orange); }
    .mode-btn[data-mode="spicy"] .mode-title { color: var(--pink); }

    .main-card {
      background: var(--card);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.65);
      border-radius: 34px;
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      margin-bottom: 20px;
    }

    .input-wrap {
      position: relative;
    }

    .name-input {
      width: 100%;
      height: 60px;
      border-radius: 999px;
      border: 1px solid var(--stroke);
      background: rgba(249,246,255,.95);
      padding: 0 22px;
      font-size: 18px;
      outline: none;
      transition: .18s ease;
      color: var(--text);
    }

    .name-input:focus {
      background: #fff;
      border-color: rgba(115,87,255,.5);
      box-shadow: 0 0 0 5px rgba(115,87,255,.08);
    }

    .name-input::placeholder {
      color: #9b90ae;
    }

    .generate-btn {
      height: 60px;
      border: none;
      border-radius: 999px;
      padding: 0 28px;
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--purple), #8d73ff);
      cursor: pointer;
      box-shadow: 0 18px 28px -16px rgba(115,87,255,.6);
      transition: .18s ease;
      white-space: nowrap;
    }

    .generate-btn:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, var(--purple-dark), #8368ff);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(320px, 1.05fr) minmax(320px, .95fr);
      gap: 18px;
      align-items: stretch;
    }

    .result-card,
    .preview-card {
      background: rgba(255,255,255,.7);
      border: 1px solid var(--stroke);
      border-radius: 28px;
      padding: 24px;
      min-height: 100%;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--purple-soft);
      color: var(--purple);
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 18px;
    }

    .main-nick {
      font-size: clamp(44px, 7vw, 78px);
      line-height: .95;
      font-weight: 900;
      letter-spacing: -.05em;
      margin-bottom: 14px;
      color: var(--text);
      word-break: break-word;
    }

    .subtext {
      color: var(--muted);
      font-size: 17px;
      margin-bottom: 22px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-primary,
    .btn-secondary {
      height: 46px;
      padding: 0 20px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: .15s ease;
    }

    .btn-primary {
      border: none;
      background: linear-gradient(135deg, var(--purple), #8d73ff);
      color: #fff;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--purple-dark), #8368ff);
    }

    .btn-secondary {
      border: 1px solid var(--stroke);
      background: #fff;
      color: var(--text);
    }

    .btn-secondary:hover {
      background: #f8f4ff;
    }

    .preview-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: #8d82a1;
      font-weight: 800;
      margin-bottom: 16px;
    }

    .preview-shell {
      min-height: 290px;
      border-radius: 26px;
      overflow: hidden;
      border: 1px solid var(--stroke);
      background: linear-gradient(145deg, #f8f5ff 0%, #efe9ff 100%);
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }

    .social-preview,
    .gamer-preview,
    .spicy-preview {
      width: 100%;
      height: 100%;
      padding: 22px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .social-preview {
      background: linear-gradient(145deg, #f9f6ff 0%, #f1ebff 100%);
    }

    .social-top {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .avatar {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 30px;
      font-weight: 900;
      flex-shrink: 0;
    }

    .avatar.social { background: linear-gradient(135deg, #7357ff, #9a80ff); box-shadow: 0 16px 26px -14px rgba(115,87,255,.55); }
    .avatar.gamer { background: linear-gradient(135deg, #f07b1f, #f9b36d); color: #201400; }
    .avatar.spicy { background: linear-gradient(135deg, #ea4d95, #f588bc); box-shadow: 0 16px 26px -14px rgba(234,77,149,.5); }

    .handle {
      font-size: 28px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -.03em;
      margin-bottom: 6px;
    }

    .bio {
      color: var(--muted);
      font-size: 14px;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .chip {
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.7);
      border: 1px solid rgba(255,255,255,.75);
      font-size: 13px;
      color: #6f6483;
      font-weight: 700;
    }

    .gamer-preview {
      background: linear-gradient(145deg, #1a1624 0%, #13101b 100%);
      color: #fff;
    }

    .gamer-preview .bio,
    .spicy-preview .bio {
      color: #bbb0cc;
    }

    .gamer-card-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
    }

    .gamer-title,
    .spicy-title {
      font-size: 34px;
      font-weight: 900;
      line-height: .98;
      letter-spacing: -.04em;
    }

    .gamer-row,
    .spicy-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .gamer-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .gamer-box {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 18px;
      padding: 12px 14px;
      font-size: 13px;
      color: #c9bfd9;
      font-weight: 700;
    }

    .spicy-preview {
      background: linear-gradient(145deg, #241a2e 0%, #1b1424 100%);
      color: #fff;
      border-color: rgba(236,78,150,.2);
    }

    .spicy-note {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      color: #e5bfd3;
      font-size: 14px;
      font-weight: 600;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 26px;
      transform: translateX(-50%) translateY(12px);
      background: #181320;
      color: #fff;
      padding: 14px 22px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 20px 40px -16px rgba(0,0,0,.35);
      opacity: 0;
      pointer-events: none;
      transition: .2s ease;
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 980px) {
      .hero {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      body { padding: 16px; }
      .wrap { max-width: 100%; }
      .modes { grid-template-columns: 1fr; }
      .controls {
        grid-template-columns: 1fr;
      }
      .generate-btn {
        width: 100%;
      }
      .main-card {
        padding: 16px;
        border-radius: 24px;
      }
      .result-card,
      .preview-card {
        padding: 18px;
        border-radius: 22px;
      }
      .header-links {
        width: 100%;
        justify-content: center;
      }
      .brand h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.3">
            <path d="M12 2L14.4 7.2L20 8.5L16 13.1L17 19L12 16L7 19L8 13.1L4 8.5L9.6 7.2L12 2Z"/>
          </svg>
        </div>
        <div>
          <h1>NickForge</h1>
          <p>Create better usernames</p>
        </div>
      </div>

      <div class="header-links">
        <a href="#" id="donateLink">☕ Donate</a>
        <span class="divider"></span>
        <a href="#" id="feedbackLink">💬 Feedback</a>
      </div>
    </header>

    <div class="modes">
      <button class="mode-btn active" data-mode="social" type="button">
        <div class="mode-title">Social</div>
        <div class="mode-desc">Clean, aesthetic, handle-style</div>
      </button>
      <button class="mode-btn" data-mode="gamer" type="button">
        <div class="mode-title">Gamer</div>
        <div class="mode-desc">Sharp, short gaming tags</div>
      </button>
      <button class="mode-btn" data-mode="spicy" type="button">
        <div class="mode-title">Spicy</div>
        <div class="mode-desc">Bold, flirty, provocative</div>
      </button>
    </div>

    <section class="main-card">
      <div class="controls">
        <div class="input-wrap">
          <input
            id="baseInput"
            class="name-input"
            type="text"
            autocomplete="off"
            placeholder="e.g., alex, ray, max"
          />
        </div>
        <button class="generate-btn" id="generateBtn" type="button">Generate</button>
      </div>

      <div class="hero">
        <div class="result-card">
          <div class="badge">✨ From your name</div>
          <div class="main-nick" id="mainNick">alexri</div>
          <div class="subtext" id="mainMeta">Clean social handle</div>

          <div class="actions">
            <button class="btn-primary" id="copyBtn" type="button">Copy</button>
            <button class="btn-secondary" id="shareBtn" type="button">Share</button>
          </div>
        </div>

        <div class="preview-card">
          <div class="preview-label">Preview</div>
          <div class="preview-shell" id="previewShell"></div>
        </div>
      </div>
    </section>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const $ = (s) => document.querySelector(s);
    const $$ = (s) => Array.from(document.querySelectorAll(s));

    const MODE_META = {
      social: "Clean social handle",
      gamer: "Short aggressive gamer tag",
      spicy: "Bold provocative alias"
    };

    const CYR_MAP = {
      а:"a", б:"b", в:"v", г:"g", д:"d", е:"e", ё:"e", ж:"zh", з:"z", и:"i", й:"y",
      к:"k", л:"l", м:"m", н:"n", о:"o", п:"p", р:"r", с:"s", т:"t", у:"u", ф:"f",
      х:"h", ц:"ts", ч:"ch", ш:"sh", щ:"sch", ъ:"", ы:"y", ь:"", э:"e", ю:"yu", я:"ya"
    };

    const DICTS = {
      social: {
        cores: [
          "alex","alena","alina","anna","aria","ava","bella","clara","diana","ella","eva","flora","freya","helen","iris","julia","kira","lara","lena","liana",
          "lina","lisa","livia","lola","lucy","luna","maya","mia","mila","mira","nina","nora","olivia","paula","rosa","sara","sofia","stella","talia","vera",
          "victoria","violet","yara","zara","zoe","alexa","amelia","aurora","bianca","camila","celine","daria","delia","elina","elisa","emilia","estelle","faye",
          "giulia","irina","isla","jasmine","karina","kiara","lara","layla","leona","lilith","loren","lucia","lyra","maria","marina","melina","mona","nadia","naomi","noelle"
        ],
        prefixes: ["its","hey","im","real","the","just","only","callme","miss","ms","mr","thisis","official","true","pure"],
        endings: ["ri","vi","li","na","la","ma","ra","ta","ia","ie","io","ya","ey","ay","ny","ly","sky","bay","wave","vibe","gram","fm","mp","io","co","dot"],
        classy: ["studio","vibes","mode","daily","pics","wave","room","verse","line","light","hush","nova","mint","bloom","glow"]
      },
      gamer: {
        cores: [
          "vex","nox","ryx","zor","kra","drav","tor","rax","vorn","grim","void","fury","rage","storm","shock","slash","blitz","crash","fang","claw",
          "wolf","venom","reign","onyx","phantom","drake","skorn","havoc","frost","blaze","quake","spike","riot","thorn","drift","rift","cinder","saber","sythe","raven",
          "rogue","wraith","warden","stryke","khaos","reaper","cypher","inferno","glitch","titan","viper","skull","ember","scar","dagger","rupture","fracture","banshee","recoil","xenon"
        ],
        endings: ["x","z","rx","zx","ix","ox","ax","on","or","ar","yn","er","r","k","n","v"],
        boosters: ["x","z","xr","zx","vk","rx","qx"]
      },
      spicy: {
        cores: [
          "velvet","sin","nox","kiss","wild","hot","sugar","honey","peach","rose","luxe","desire","flame","blush","silk","midnight","cherry","nova","scarlet","amber",
          "vixen","tempt","angel","devil","dream","after","venus","siren","ruby","muse","fever","heat","soft","wicked","gloss","lust","darling","tease","night","glow"
        ],
        endings: ["xo","rx","ria","na","va","la","ina","ira","ora","luna","kiss","night","love","vex","nox","rose"],
        soft: ["vel","sin","lux","rose","kiss","hush","glow","lush","wild","soft"]
      }
    };

    function translit(str) {
      return String(str || "")
        .toLowerCase()
        .split("")
        .map(ch => CYR_MAP[ch] ?? ch)
        .join("");
    }

    function cleanInput(str) {
      return translit(str).replace(/[^a-z0-9]/g, "");
    }

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function uniq(arr) {
      return [...new Set(arr)];
    }

    function makeBaseFragments(base) {
      const b = cleanInput(base);
      if (!b) return [];
      const frags = new Set();

      frags.add(b);
      if (b.length >= 2) frags.add(b.slice(0, 2));
      if (b.length >= 3) frags.add(b.slice(0, 3));
      if (b.length >= 4) frags.add(b.slice(0, 4));
      if (b.length >= 5) frags.add(b.slice(0, 5));
      if (b.length >= 3) frags.add(b.slice(-3));
      if (b.length >= 4) frags.add(b.slice(-4));
      if (b.length >= 5) frags.add(b.slice(1, 5));
      if (b.length >= 4) frags.add(b.slice(0, -1));
      if (b.length >= 4) frags.add(b.slice(1));

      return uniq([...frags].filter(Boolean));
    }

    function vowelsCount(s) {
      return (s.match(/[aeiouy]/g) || []).length;
    }

    function scoreSocial(name, baseFrags) {
      let score = 0;
      if (name.length >= 5 && name.length <= 9) score += 50;
      else if (name.length === 4 || name.length === 10) score += 25;
      else score -= 35;

      const vowels = vowelsCount(name);
      if (vowels >= 2 && vowels <= 4) score += 30;
      if (name.includes(".")) score += 18;
      if (/[zxq]{2,}/.test(name)) score -= 35;
      if (/(.)\1\1/.test(name)) score -= 80;
      if (/^[a-z][a-z.]+$/.test(name)) score += 16;
      if (/[aeiou]{2,}/.test(name)) score += 12;

      let relation = 0;
      for (const f of baseFrags) {
        if (f.length >= 4 && name.includes(f)) relation = Math.max(relation, 80);
        else if (f.length === 3 && name.includes(f)) relation = Math.max(relation, 55);
        else if (f.length === 2 && name.includes(f)) relation = Math.max(relation, 24);
      }
      score += relation;
      if (relation === 0 && baseFrags.length) score -= 160;

      return score;
    }

    function scoreGamer(name, baseFrags) {
      let score = 0;
      if (name.length >= 4 && name.length <= 8) score += 55;
      else if (name.length === 9) score += 15;
      else score -= 40;

      if (/[xzrk]/.test(name)) score += 24;
      if (/[^aeiou]{2,}/.test(name)) score += 20;
      if (/(.)\1\1/.test(name)) score -= 90;
      if (name.endsWith("x") || name.endsWith("z")) score += 16;

      let relation = 0;
      for (const f of baseFrags) {
        if (f.length >= 4 && name.includes(f)) relation = Math.max(relation, 90);
        else if (f.length === 3 && name.includes(f)) relation = Math.max(relation, 62);
        else if (f.length === 2 && name.includes(f)) relation = Math.max(relation, 26);
      }
      score += relation;
      if (relation === 0 && baseFrags.length) score -= 170;

      return score;
    }

    function scoreSpicy(name, baseFrags) {
      let score = 0;
      if (name.length >= 5 && name.length <= 9) score += 52;
      else if (name.length === 10) score += 18;
      else score -= 40;

      if (/(vel|sin|kiss|nox|rose|wild|xo)/.test(name)) score += 38;
      if (vowelsCount(name) >= 2) score += 18;
      if (/(.)\1\1/.test(name)) score -= 80;

      let relation = 0;
      for (const f of baseFrags) {
        if (f.length >= 4 && name.includes(f)) relation = Math.max(relation, 90);
        else if (f.length === 3 && name.includes(f)) relation = Math.max(relation, 60);
        else if (f.length === 2 && name.includes(f)) relation = Math.max(relation, 24);
      }
      score += relation;
      if (relation === 0 && baseFrags.length) score -= 170;

      return score;
    }

    function buildSocialCandidates(baseFrags) {
      const out = [];
      const base = pick(baseFrags);
      const clipped = base.slice(0, 4);
      const clipped3 = base.slice(0, 3);

      for (let i = 0; i < 700; i++) {
        const strategy = Math.floor(Math.random() * 18);
        let n = "";

        switch (strategy) {
          case 0: n = base + pick(DICTS.social.endings); break;
          case 1: n = clipped + pick(DICTS.social.endings); break;
          case 2: n = pick(DICTS.social.prefixes) + base; break;
          case 3: n = base + "." + pick(["fm","mp","io","co"]); break;
          case 4: n = clipped3 + pick(DICTS.social.endings) + pick(["i","a","y"]); break;
          case 5: n = base + pick(DICTS.social.classy); break;
          case 6: n = clipped + pick(["ri","vi","na","ia","li"]); break;
          case 7: n = pick(DICTS.social.cores).slice(0,3) + base; break;
          case 8: n = base + pick(["daily","wave","vibe","mode"]); break;
          case 9: n = "its" + clipped; break;
          case 10: n = "hey" + clipped; break;
          case 11: n = clipped + "." + pick(["art","tv","fm","mp"]); break;
          case 12: n = clipped + pick(["ie","ey","io","ly","ny"]); break;
          case 13: n = base + pick(["nova","glow","mint","bloom"]); break;
          case 14: n = clipped3 + pick(DICTS.social.cores).slice(0,3); break;
          case 15: n = base.slice(-3) + pick(["ri","la","na","io"]); break;
          case 16: n = pick(["real","only","miss"]) + clipped; break;
          default: n = clipped + pick(["gram","tok","hub","dot"]); break;
        }

        out.push(n.toLowerCase().replace(/[^a-z0-9.]/g, "").slice(0, 12));
      }

      return out;
    }

    function buildGamerCandidates(baseFrags) {
      const out = [];
      const base = pick(baseFrags);
      const clipped = base.slice(0, 4);
      const clipped3 = base.slice(0, 3);

      for (let i = 0; i < 700; i++) {
        const strategy = Math.floor(Math.random() * 16);
        let n = "";

        switch (strategy) {
          case 0: n = base + pick(DICTS.gamer.endings); break;
          case 1: n = clipped + "x"; break;
          case 2: n = clipped + "z"; break;
          case 3: n = "x" + clipped; break;
          case 4: n = pick(DICTS.gamer.cores).slice(0,3) + clipped3; break;
          case 5: n = clipped3 + pick(DICTS.gamer.cores).slice(0,3); break;
          case 6: n = base + pick(["rx","zx","ix","ox"]); break;
          case 7: n = clipped + pick(["rage","core","flux"]).slice(0,3); break;
          case 8: n = pick(DICTS.gamer.boosters) + clipped; break;
          case 9: n = clipped3 + pick(["xor","zor","vex","nox"]); break;
          case 10: n = clipped + pick(["on","or","ar","yn"]); break;
          case 11: n = clipped3 + pick(["kz","rz","vx","qx"]); break;
          case 12: n = base.slice(-3) + "x"; break;
          case 13: n = clipped + pick(["byte","rift","drip"]).slice(0,3); break;
          case 14: n = pick(["xx","zz","rk"]) + clipped3; break;
          default: n = clipped + pick(["sk","vr","qt"]); break;
        }

        out.push(n.toLowerCase().replace(/[^a-z0-9]/g, "").slice(0, 11));
      }

      return out;
    }

    function buildSpicyCandidates(baseFrags) {
      const out = [];
      const base = pick(baseFrags);
      const clipped = base.slice(0, 4);
      const clipped3 = base.slice(0, 3);

      for (let i = 0; i < 700; i++) {
        const strategy = Math.floor(Math.random() * 16);
        let n = "";

        switch (strategy) {
          case 0: n = pick(DICTS.spicy.cores) + clipped; break;
          case 1: n = clipped + pick(DICTS.spicy.endings); break;
          case 2: n = clipped + "xo"; break;
          case 3: n = clipped + "kiss"; break;
          case 4: n = clipped + "nox"; break;
          case 5: n = "vel" + clipped; break;
          case 6: n = "sin" + clipped; break;
          case 7: n = "wild" + clipped; break;
          case 8: n = clipped + pick(["ria","mia","ina","ora"]); break;
          case 9: n = clipped3 + pick(["xo","rx","na","la"]); break;
          case 10: n = pick(["rose","kiss","hush","glow"]) + clipped3; break;
          case 11: n = clipped + "love"; break;
          case 12: n = clipped + "night"; break;
          case 13: n = pick(["sweet","dark","lush"]) + clipped3; break;
          case 14: n = clipped3 + pick(["vex","vel","sin"]); break;
          default: n = clipped + pick(["rose","doll","babe"]).slice(0,3); break;
        }

        out.push(n.toLowerCase().replace(/[^a-z0-9]/g, "").slice(0, 12));
      }

      return out;
    }

    function generateFromName(mode, rawInput) {
      const clean = cleanInput(rawInput);
      const baseFrags = makeBaseFragments(clean);

      if (!clean || clean.length < 2) {
        if (mode === "social") return pick(DICTS.social.cores) + pick(["ri","ia","fm","io"]);
        if (mode === "gamer") return pick(DICTS.gamer.cores) + pick(["x","z","rx"]);
        return pick(DICTS.spicy.cores) + pick(["xo","na","nox"]);
      }

      let candidates = [];
      if (mode === "social") candidates = buildSocialCandidates(baseFrags);
      else if (mode === "gamer") candidates = buildGamerCandidates(baseFrags);
      else candidates = buildSpicyCandidates(baseFrags);

      const scored = [];
      const seen = new Set();

      for (const c of candidates) {
        if (!c || c.length < 3 || c.length > 12) continue;
        if (seen.has(c)) continue;

        let score = 0;
        if (mode === "social") score = scoreSocial(c, baseFrags);
        else if (mode === "gamer") score = scoreGamer(c, baseFrags);
        else score = scoreSpicy(c, baseFrags);

        if (score < 70) continue;
        seen.add(c);
        scored.push({ name: c, score });
      }

      scored.sort((a, b) => b.score - a.score);

      if (scored.length) return scored[0].name;

      if (mode === "social") return clean.slice(0, 4) + "ri";
      if (mode === "gamer") return clean.slice(0, 4) + "x";
      return clean.slice(0, 4) + "xo";
    }

    function renderPreview(name, mode) {
      const shell = $("#previewShell");
      const upper = name[0] ? name[0].toUpperCase() : "N";

      if (mode === "social") {
        shell.innerHTML = `
          <div class="social-preview">
            <div class="social-top">
              <div class="avatar social">${upper}</div>
              <div>
                <div class="handle">@${name}</div>
                <div class="bio">creator • ${pick(["aesthetic", "design", "music", "travel", "lifestyle"])}</div>
              </div>
            </div>
            <div class="stats">
              <div class="chip">#${pick(["clean", "soft", "daily", "fresh"])}</div>
              <div class="chip">#${pick(["minimal", "vibes", "style", "mood"])}</div>
              <div class="chip">${pick(["1.8k followers", "4.2k followers", "9.1k followers"])}</div>
            </div>
          </div>
        `;
        return;
      }

      if (mode === "gamer") {
        shell.innerHTML = `
          <div class="gamer-preview">
            <div class="gamer-row">
              <div class="avatar gamer">🎮</div>
              <div>
                <div class="gamer-title">${name}</div>
                <div class="bio">${pick(["ranked main", "clutch machine", "night grind", "solo queue"])}</div>
              </div>
            </div>
            <div class="gamer-card-main">
              <div class="gamer-stats">
                <div class="gamer-box">Level ${Math.floor(Math.random()*60)+20}</div>
                <div class="gamer-box">${pick(["EU server","NA server","Solo main","Duo main"])}</div>
                <div class="gamer-box">${pick(["MVP 12x","K/D 2.7","Top 1%","Clutch 89%"])}</div>
                <div class="gamer-box">${pick(["FPS", "MOBA", "BR", "Arena"])}</div>
              </div>
            </div>
          </div>
        `;
        return;
      }

      shell.innerHTML = `
        <div class="spicy-preview">
          <div class="spicy-row">
            <div class="avatar spicy">🔥</div>
            <div>
              <div class="spicy-title">${name}</div>
              <div class="bio">${pick(["bold energy", "late-night vibe", "too hot to ignore", "soft danger"])}</div>
            </div>
          </div>
          <div class="spicy-note">✨ ${pick([
            "don't be boring",
            "caught your attention",
            "sweet face, sharp vibe",
            "soft look, bad idea"
          ])}</div>
        </div>
      `;
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        return true;
      } catch {
        const ta = document.createElement("textarea");
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        const ok = document.execCommand("copy");
        document.body.removeChild(ta);
        return ok;
      }
    }

    function showToast(msg) {
      const t = $("#toast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => t.classList.remove("show"), 1500);
    }

    let currentMode = "social";
    let currentName = "alexri";

    function renderMain() {
      $("#mainNick").textContent = currentName;
      $("#mainMeta").textContent = MODE_META[currentMode];
      renderPreview(currentName, currentMode);
    }

    function generateMain() {
      currentName = generateFromName(currentMode, $("#baseInput").value);
      renderMain();
    }

    $$(".mode-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        $$(".mode-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentMode = btn.dataset.mode;

        $("#baseInput").placeholder =
          currentMode === "social"
            ? "e.g., alex, ray, max"
            : currentMode === "gamer"
            ? "e.g., alex, rex, kai"
            : "e.g., alena, mia, rose";

        generateMain();
      });
    });

    $("#generateBtn").addEventListener("click", generateMain);
    $("#baseInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") generateMain();
    });

    $("#copyBtn").addEventListener("click", async () => {
      const ok = await copyText(currentName);
      showToast(ok ? "Copied" : "Copy failed");
    });

    $("#shareBtn").addEventListener("click", async () => {
      if (navigator.share) {
        try {
          await navigator.share({ title: "NickForge", text: currentName });
          return;
        } catch {}
      }
      const ok = await copyText(currentName);
      showToast(ok ? "Name copied" : "Share failed");
    });

    $("#donateLink").addEventListener("click", (e) => {
      e.preventDefault();
      window.open("https://buymeacoffee.com/", "_blank");
    });

    $("#feedbackLink").addEventListener("click", (e) => {
      e.preventDefault();
      window.open("mailto:feedback@nickforge.com", "_blank");
    });

    document.addEventListener("keydown", async (e) => {
      if (e.key.toLowerCase() === "c" && !e.ctrlKey && !e.metaKey) {
        const active = document.activeElement;
        if (active && (active.tagName === "INPUT" || active.tagName === "TEXTAREA")) return;
        const ok = await copyText(currentName);
        showToast(ok ? "Copied" : "Copy failed");
      }
    });

    renderMain();
  </script>
</body>
</html>
